{% extends "base.html" %}

{% block title %}メタルの種類{% endblock title %}

{% block stylesheets %}
<link rel="stylesheet" href="{{ get_url(path='css/metal.css') }}">
{% endblock stylesheets %}

{% block content %}
<div id="header_wrap">
  <header id="header">
    <h1 id="metal_title">メタルの種類</h1>
  </header>
</div>

<div id="main">
  <section class="wrapper">
    <div class="img_wrap">
      <img src="{{ get_url(path='img/ink.png') }}" alt="">
      <h2 class="img_title">一覧</h2>
    </div>

    <div class="content">
      <ul>
        {% for genre_page in section.pages %}
          <li><a href="{{ genre_page.permalink | safe }}">{{ genre_page.title }}</a></li>
        {% endfor %}
      </ul>
    </div>
  </section>
</div>

<footer id="footer">
  <p>© 2021 reisuta</p>
</footer>
{% endblock content %}
